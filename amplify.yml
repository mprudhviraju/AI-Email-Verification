version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - pnpm install --frozen-lockfile
        # Generate typed GraphQL hooks before building the frontend
        - pnpm codegen
    build:
      commands:
        - pnpm --filter web build
  artifacts:
    # Vite outputs to apps/web/dist by default
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/web/node_modules/**/*
      - packages/shared/node_modules/**/*

# Environment variables to set in Amplify Console → App settings → Environment variables:
#
#   VITE_API_URL   https://api.yourdomain.com   (your deployed API host — EC2, ECS, etc.)
#
# SPA routing redirect (set in Amplify Console → Rewrites and redirects):
#   Source:  </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>
#   Target:  /index.html
#   Type:    200 (Rewrite)
#   Required for React Router to work on page refresh / direct URL navigation.
